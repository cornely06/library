<!DOCTYPE html>
<html>
    <head>
        <link href="css/style.css" rel="stylesheet" type="text/css">
    </head>
    <body>
        <button id="new-book" type="button">New Book</button>
        <div class="modal" id="myModal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <p>New Book Form</p>
                <form id="new-book">
                    <div class="form-group">
                        <label for="title">Title:</label>
                        <input type="text" id="title" name="title">
                    </div>
                    <div class="form-group">
                        <label for="author">Author:</label>
                        <input type="text" id="author" name="author">
                    </div>
                    <div class="form-group">
                        <label for="pages">Pages:</label>
                        <input type="text" id="pages" name="pages">
                    </div>
                    <div class="form-group">
                        <label for="year">Year:</label>
                        <input type="text" id="year" name="year">
                    </div>
                    <div class="form-group">
                        <label for="unread">Not Read Yet</label>
                        <input type="radio" id="unread" name="is-read" value="false" checked>
                        <label for="read">Read</label>
                        <input type="radio" id="read" name="is-read" value="true">
                    </div>
                </form>
                <button id="add" type="button">Add Book</button>
            </div>
        </div>
        <button id="show-library" type="button">Show Library</button>
        <ul id="library"></ul>
        <script src="js/myscripts.js"></script>      
    </body>
</html>
