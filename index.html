<!DOCTYPE html>
<html>
    <head>
        <link href="css/style.css" rel="stylesheet" type="text/css">
    </head>
    <body>
        <button id="new-book-btn" type="button">New Book</button>
        <button id="show-all-book-btn" type="button">Show All Books</button>
        <button id="read-book-btn" type="button">Show Read Books</button>
        <button id="unread-book-btn" type="button">Show Unread Books</button>
        
        <div class="modal" id="myModal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <p>New Book</p>
                <form id="new-book-form">
                    <div class="form-group">
                        <label for="title">Title:</label>
                        <input type="text" id="title" name="title" required>
                    </div>
                    <div class="form-group">
                        <label for="author">Author:</label>
                        <input type="text" id="author" name="author" required>
                    </div>
                    <div class="form-group">
                        <label for="year">Year:</label>
                        <input type="text" id="year" name="year" required>
                    </div>
                    <div class="form-group">
                        <label for="pages">Pages:</label>
                        <input type="text" id="pages" name="pages" required>
                    </div>
                    <div class="form-group">
                        <label>
                        <input class="input-radio" type="radio" id="unread" name="is-read" value="false" checked>
                        Not Read Yet</label>
                        <label>
                        <input class="input-radio" type="radio" id="read" name="is-read" value="true">
                        Read</label>
                    </div>
                    <input type="submit" value="Add Book">
                </form>
            </div>
        </div>
        <div id="library-container"></div>
        <script src="js/myscripts.js"></script>      
    </body>
</html>
